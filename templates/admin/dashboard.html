{% extends "admin/base.html" %}

{% block content %}
<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <aside class="w-64 flex-shrink-0 flex flex-col bg-gray-900 text-white transition-all">
    <div class="h-16 flex items-center px-6 font-bold text-lg border-b border-gray-800">
      Personal Trainer Admin
    </div>
    <div class="flex-1 overflow-y-auto py-4">
      <nav class="space-y-1 px-2">
        <a href="/admin/dashboard" class="bg-gray-800 text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">
          Dashboard
        </a>
        <a href="#" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">
          User Management
        </a>
        <a href="#" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">
          Leaderboard
        </a>
      </nav>
    </div>
    <div class="flex-shrink-0 flex border-t border-gray-800 p-4">
      <div class="flex items-center w-full">
        <div class="ml-3 font-medium text-sm truncate">
          <p class="truncate">{{ admin.email }}</p>
          <a href="/admin/logout" class="text-xs text-gray-400 hover:text-white inline-block mt-1">Logout</a>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-y-auto bg-gray-50">
    <main class="flex-1 py-10 px-8">
      <h1 class="text-2xl font-semibold text-gray-900">Dashboard Overview</h1>
      
      <div class="mt-8 grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
        
        <!-- Metric Card -->
        <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-100">
          <div class="p-5">
            <div class="flex items-center">
              <div class="w-0 flex-1">
                <dl>
                  <dt class="text-sm font-medium text-gray-500 truncate">Total Registered Users</dt>
                  <dd class="mt-2 text-3xl font-semibold text-gray-900">{{ users_count }}</dd>
                </dl>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
{% endblock %}
